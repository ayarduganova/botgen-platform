bot: OrderBot

slots:
  name:
    type: text
  phone:
    type: phone
    pattern: '^(\+?\d[\d\s\-()]{7,}\d)$'
    error_text: "Похоже, это не номер телефона. Введите, например: +385 91 123 4567"

flow:
  - type: say
    text: "Привет! Давай оформим заказ."
  - type: ask
    slot: name
    text: "Как тебя зовут?"
  - type: ask
    slot: phone
    text: "Твой телефон?"
  - type: say
    text: "Спасибо, {name}! Ваш телефон: {phone}"
  - type: end

rules:
  - name: cancel
    pattern: "^(cancel|отмена|стоп|выход)$"
    response: "Ок, отменяю."
    action: end

  - name: help
    pattern: "^(help|помощь|что ты умеешь)$"
    response: "Я могу оформить заказ: спрошу имя и телефон. В любой момент напишите 'отмена'."
    action: none

  - name: restart
    pattern: "^(restart|заново|сначала|старт)$"
    response: "Ок, начинаем заново."
    action: restart